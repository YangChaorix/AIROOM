services:
  # ── Web Dashboard + 内嵌调度器 ─────────────────────────────────────────────
  web:
    image: stock-agent-v3:latest
    command: python web_server.py
    env_file:
      - .env
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "8888:8888"
    volumes:
      - ./data:/app/data # SQLite DB 持久化
      - ./logs:/app/logs # 日志持久化
      - ./.env:/app/.env:ro # API Keys（只读）
      - ./config/models.json:/app/config/models.json:ro # 模型配置（只读）
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
