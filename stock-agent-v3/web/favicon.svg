<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- 背景 -->
  <rect width="32" height="32" rx="6" fill="#0f1117"/>
  <!-- 第1柱：小绿（起跌，低位） -->
  <line x1="5" y1="25" x2="5" y2="27" stroke="#22c55e" stroke-width="1.2"/>
  <rect x="3" y="22" width="4" height="3" rx="0.8" fill="#22c55e"/>
  <line x1="5" y1="20" x2="5" y2="22" stroke="#22c55e" stroke-width="1.2"/>
  <!-- 第2柱：红涨 -->
  <line x1="10" y1="18" x2="10" y2="20" stroke="#ef4444" stroke-width="1.2"/>
  <rect x="8" y="20" width="4" height="5" rx="0.8" fill="#ef4444"/>
  <line x1="10" y1="25" x2="10" y2="27" stroke="#ef4444" stroke-width="1.2"/>
  <!-- 第3柱：红涨，更高 -->
  <line x1="15" y1="13" x2="15" y2="15" stroke="#ef4444" stroke-width="1.2"/>
  <rect x="13" y="15" width="4" height="6" rx="0.8" fill="#ef4444"/>
  <line x1="15" y1="21" x2="15" y2="23" stroke="#ef4444" stroke-width="1.2"/>
  <!-- 第4柱：小绿（回调） -->
  <line x1="20" y1="14" x2="20" y2="16" stroke="#22c55e" stroke-width="1.2"/>
  <rect x="18" y="16" width="4" height="3" rx="0.8" fill="#22c55e"/>
  <line x1="20" y1="19" x2="20" y2="21" stroke="#22c55e" stroke-width="1.2"/>
  <!-- 第5柱：红涨，最高 -->
  <line x1="25" y1="7" x2="25" y2="9" stroke="#ef4444" stroke-width="1.2"/>
  <rect x="23" y="9" width="4" height="7" rx="0.8" fill="#ef4444"/>
  <line x1="25" y1="16" x2="25" y2="18" stroke="#ef4444" stroke-width="1.2"/>
  <!-- 趋势线（蓝色，向右上方） -->
  <polyline points="5,23 10,22 15,18 20,17 25,12" fill="none" stroke="#60a5fa" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
</svg>
